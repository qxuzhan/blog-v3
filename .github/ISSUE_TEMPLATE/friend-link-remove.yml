name: 友链移除
description: 移除已有友链
labels: [friend-link/remove]
body:
  - type: markdown
    attributes:
      value: |
        用于移除已有友链。

        **移除原因**（请选择或填写）：
        - 站点已关闭
        - 长期失联
        - 其他原因

  - type: input
    id: originalIssueId
    attributes:
      label: 原始申请 Issue ID
      description: |
        申请友链时的 Issue 编号（如 #123）。
        用于验证你的身份。如果找不到原 Issue，请说明原因。
      placeholder: 例如：123

  - type: input
    id: link
    attributes:
      label: 博客地址
      description: 你的博客 URL（用于定位要移除的友链）
      placeholder: https://www.qixz.cn/
    validations:
      required: true

  - type: dropdown
    id: reason
    attributes:
      label: 移除原因
      options:
        - 站点已关闭
        - 长期失联
        - 对方要求移除
        - 其他原因

  - type: textarea
    id: comment
    attributes:
      label: 其他说明（可选）
      description: 如有其他需要说明的情况，请在此填写
