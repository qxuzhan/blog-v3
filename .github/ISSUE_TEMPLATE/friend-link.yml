name: 友链申请
description: 申请添加友链
labels: [friend-link/add]
body:
  - type: markdown
    attributes:
      value: |
        感谢你申请友链！请填写以下信息。

        **申请要求**：
        - 确保你的博客内容不违反任何法律。
        - 确保你的博客有效文章数至少有 10 篇（非日常说说等）。
        - 已运行至少3个月，并且保证能够长期存活。
        - 请确保你已添加本站友链。

        **本站信息**：
        - 博主：筱序二十
        - 站名：青序栈
        - 地址：https://www.qixz.cn/
        - 描述：青序成栈·向简而生

  - type: input
    id: author
    attributes:
      label: 博主昵称
      placeholder: 筱序二十
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: 博客名称
      placeholder: 青序栈
    validations:
      required: true

  - type: input
    id: desc
    attributes:
      label: 博客Slogan
      placeholder: 青序成栈·向简而生
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: 博客地址
      placeholder: https://www.qixz.cn/
    validations:
      required: true

  - type: input
    id: linkPage
    attributes:
      label: 友链页面地址
      placeholder: https://www.qixz.cn/link
    validations:
      required: true

  - type: input
    id: avatar
    attributes:
      label: 头像链接
      placeholder: https://www.qixz.cn/avatar.avif
    validations:
      required: true

  - type: input
    id: feed
    attributes:
      label: 订阅源（可选）
      placeholder: https://www.qixz.cn/atom.xml

  - type: input
    id: sitenick
    attributes:
      label: 网站趣称（可选）

  - type: input
    id: archs
    attributes:
      label: 技术架构
      description: 多个用逗号分隔。仅支持：服务器、国内 CDN、虚拟主机、Astro、Cloudflare、Deno Deploy、EdgeOne、Esa、GitHub Pages、Golang、Gridea、Halo、Hexo、HTML、Hugo、Jekyll、Mix Space、Netlify、Next.js、NotionNext、Nuxt、PHP、Python、React、Typecho、Vercel、VitePress、Vue、VuePress、WordPress、Zebaur
      placeholder: 例如：Nuxt, Cloudflare

  - type: textarea
    id: comment
    attributes:
      label: 备注（可选）

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      options:
        - label: 我已添加本站友链
          required: true
        - label: 我确认以上信息真实有效
          required: true
